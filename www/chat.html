<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hybrid P2P Chat</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f4f9; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); display:flex; justify-content:center; align-items:center; z-index: 10; }
        .modal-box { background:#fff; padding:30px; border-radius:8px; display:flex; flex-direction:column; gap:10px; width: 300px;}
        .modal-box input, .modal-box button { padding: 10px; font-size: 16px; }
        .modal-box button { background: #4CAF50; color: white; border: none; cursor: pointer; }
        
        .sidebar { width: 250px; background: #2c3e50; color: white; display: flex; flex-direction: column; }
        .sidebar h3 { margin: 0; padding: 15px; background: #1a252f; font-size: 16px; }
        .sidebar ul { list-style: none; padding: 0; margin: 0; flex: 1; overflow-y: auto; }
        /* .sidebar li { padding: 12px 15px; border-bottom: 1px solid #34495e; cursor: pointer; } */
        .sidebar li { padding: 12px 15px; border-bottom: 1px solid #34495e; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .unread-badge { background-color: #e74c3c; color: white; border-radius: 12px; padding: 2px 8px; font-size: 12px; font-weight: bold; display: none; }
        .sidebar li:hover { background: #34495e; }
        .sidebar li.active { background: #3498db; font-weight: bold; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #fff; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; background: #fafafa;}
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 60%; padding: 10px 15px; border-radius: 15px; background: #f1f0f0; align-self: flex-start; }
        .msg.mine { background: #0084ff; color: white; align-self: flex-end; }
        .msg-info { font-size: 11px; margin-bottom: 5px; opacity: 0.8; }
        
        .input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; background: #fafafa;}
        .input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; padding-left: 15px;}
        .input-area button { padding: 10px 20px; background: #0084ff; color: white; border: none; border-radius: 20px; cursor: pointer; }
        
        .notification { color: #e74c3c; font-weight: bold; font-size: 14px; display: none; }
    </style>
</head>
<body>

    <!-- Màn hình Đăng nhập -->
    <div id="loginModal" class="modal">
        <div class="modal-box">
            <h2 style="margin-top: 0; text-align: center;">Vào Chat P2P</h2>
            <input type="text" id="username" placeholder="Tên của bạn...">
            <input type="text" id="myIp" value="127.0.0.1" placeholder="IP của bạn">
            <input type="text" id="myPort" placeholder="Cổng đang chạy (VD: 9001)">
            <button onclick="login()">Đăng nhập</button>
        </div>
    </div>

    <!-- Màn hình Chat chính -->
    <div class="sidebar">
        <h3>📢 Kênh (Channels)</h3>
        <!-- <ul id="channelList">
            <li class="active" onclick="changeChannel('general')"># general</li>
            <li onclick="changeChannel('study-group')"># study-group</li>
        </ul> -->
        <ul id="channelList">
            <li class="active" onclick="changeChannel('general')" id="tab-general">
                <span># general</span>
                <span class="unread-badge" id="badge-general">0</span>
            </li>
            <li onclick="changeChannel('study-group')" id="tab-study-group">
                <span># study-group</span>
                <span class="unread-badge" id="badge-study-group">0</span>
            </li>
        </ul>
        <h3>🟢 Đang Online</h3>
        <ul id="peerList"></ul>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <h2 id="channelTitle" style="margin: 0;"># general</h2>
            <div style="display: flex; gap: 15px; align-items: center;">
                <span id="notifyBadge" class="notification">🔔 Có tin nhắn mới!</span>
                <span id="userInfo" style="color: #555;"></span>
            </div>
        </div>
        <div class="messages" id="messagesBox"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Nhập tin nhắn..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Gửi</button>
        </div>
    </div>

    <!-- Nhúng file Logic Javascript -->
    <script src="/static/js/chat.js"></script>

</body>
</html>
